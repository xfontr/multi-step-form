name: Unit tests

on:
    workflow_call:

jobs:
    test:
        name: Run unit tests
        runs-on: ubuntu-latest

        steps:
            - name: Git checkout
              uses: actions/checkout@v3

            - name: Install pnpm
              uses: pnpm/action-setup@v4
              with:
                  run_install: true

            - name: Install node
              uses: actions/setup-node@v6
              with:
                  node-version: "23.10.0"

            - name: Testing
              run: pnpm test

            - name: Linting
              run: pnpm lint
